services:
  postgres:
    image: postgres:16-alpine
    container_name: order-platform-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: order-platform-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: order-platform-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  order-service:
    build:
      context: ..
      dockerfile: src/Services/OrderService/Dockerfile
    container_name: order-platform-order-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__OrdersDb: Host=postgres;Port=5432;Database=orders;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      Outbox__Enabled: "true"
      Outbox__PollIntervalMilliseconds: 1000
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory-service:
    build:
      context: ..
      dockerfile: src/Services/InventoryService/Dockerfile
    container_name: order-platform-inventory-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__InventoryDb: Host=postgres;Port=5432;Database=orders;Username=postgres;Password=postgres
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      Outbox__Enabled: "true"
      Outbox__PollIntervalMilliseconds: 1000
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
    build:
      context: ..
      dockerfile: src/Services/PaymentService/Dockerfile
    container_name: order-platform-payment-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PaymentsDb: Host=postgres;Port=5432;Database=orders;Username=postgres;Password=postgres
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      Payment__SimulationMode: AlwaysSuccess
      Outbox__Enabled: "true"
      Outbox__PollIntervalMilliseconds: 1000
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy


  notification-service:
    build:
      context: ..
      dockerfile: src/Services/NotificationService/Dockerfile
    container_name: order-platform-notification-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__NotificationsDb: Host=postgres;Port=5432;Database=orders;Username=postgres;Password=postgres
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      Outbox__Enabled: "true"
      Outbox__PollIntervalMilliseconds: 1000
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  reporting-service:
    build:
      context: ..
      dockerfile: src/Services/ReportingService/Dockerfile
    container_name: order-platform-reporting-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ReportingDb: Host=postgres;Port=5432;Database=orders;Username=postgres;Password=postgres
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build:
      context: ..
      dockerfile: src/ApiGateway/Dockerfile
    container_name: order-platform-api-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ServiceUrls__OrderService: http://order-service:8080
      ServiceUrls__InventoryService: http://inventory-service:8080
      ServiceUrls__PaymentService: http://payment-service:8080
      ServiceUrls__NotificationService: http://notification-service:8080
      ServiceUrls__ReportingService: http://reporting-service:8080
      GatewayAuth__ApiKeyHeaderName: X-Demo-Api-Key
      GatewayAuth__ApiKey: local-dev-key
      GatewayAuth__BearerToken: local-dev-token
    ports:
      - "8090:8080"
    depends_on:
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
      reporting-service:
        condition: service_started


volumes:
  postgres-data:
