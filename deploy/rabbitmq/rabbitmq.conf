# RabbitMQ 3.13+/4.x boot-time definitions import.
# The core definitions importer does not require the management plugin and is
# the current recommended startup configuration style.
definitions.import_backend = local_filesystem
definitions.local.path = /etc/rabbitmq/definitions.json

# Keep the management UI available on the standard container interface.
management.tcp.ip = 0.0.0.0
management.tcp.port = 15672
